# Quarkus Configuration
quarkus.application.name=cadastro-usuarios
quarkus.application.version=1.0.0

# Server Configuration
quarkus.http.port=8080
quarkus.http.host=0.0.0.0
quarkus.http.root-path=/

# JSF Configuration
quarkus.jsf.enable=true
quarkus.jsf.dev-mode=false

# Logging
quarkus.log.level=INFO
quarkus.log.file.enable=false

# Build Configuration
quarkus.native.enable-all-charsets=true
quarkus.build.pkg-type=uber-jar

# Performance Optimization
quarkus.smallrye-context-propagation.enabled=false
quarkus.log.console.json=false